name: Build Windows EXE

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Publish installer to GitHub Releases'
        type: boolean
        default: false
  push:
    branches: [main]

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build EXE (artifact-only)
        if: ${{ !inputs.publish_release }}
        run: npm run dist:win

      - name: Build EXE (publish to GitHub Releases)
        if: ${{ inputs.publish_release }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win:publish

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: KnightAuraChess-windows-exe
          path: |
            release/*.exe
            release/*.blockmap
          if-no-files-found: error
